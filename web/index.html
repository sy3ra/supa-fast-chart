<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Fast Chart</title>
</head>

<body>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #111;
      color: #ccc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 48px;
      /* Slightly taller */
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      padding: 0 4px;
      /* Less padding, tabs touch edge */
      box-sizing: border-box;
      z-index: 100;
    }

    #tab-bar {
      display: flex;
      flex: 1;
      overflow-x: auto;
      height: 100%;
      scrollbar-width: none;
      /* Hide scrollbar Firefox */
    }

    #tab-bar::-webkit-scrollbar {
      display: none;
      /* Hide scrollbar Chrome/Safari */
    }

    .tab {
      display: flex;
      align-items: center;
      padding: 0 20px;
      height: 100%;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: #777;
      border-right: 1px solid #2a2a2a;
      background: #1a1a1a;
      user-select: none;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
      position: relative;
    }

    .tab:hover {
      background: #222;
      color: #aaa;
    }

    .tab.active {
      background: #111;
      /* Darker to blend with canvas */
      color: #00e0ff;
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: 0px;
      left: 0;
      width: 100%;
      height: 3px;
      background: #00e0ff;
      box-shadow: 0 -2px 8px rgba(0, 224, 255, 0.4);
    }

    .tab-close {
      margin-left: 10px;
      font-size: 16px;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      color: #555;
      transition: all 0.2s;
    }

    .tab-close:hover {
      background: rgba(255, 50, 50, 0.2);
      color: #ff4444;
    }

    #new-tab-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      color: #666;
      background: transparent;
      border: none;
      border-radius: 4px;
      margin-left: 8px;
    }

    #new-tab-btn:hover {
      color: #fff;
      background: #333;
    }

    #app {
      position: absolute;
      top: 48px;
      /* Match new ui-layer height */
      left: 0;
      width: 100%;
      height: calc(100% - 48px);
    }
  </style>

  <div id="ui-layer">
    <div id="tab-bar">
      <!-- Tabs injected by JS -->
    </div>
    <button id="new-tab-btn" title="New Tab">+</button>
  </div>

  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
